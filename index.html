function renderDashboard(pollenData,weatherData){
  var hourIdx=getCurrentHourIndex();
  var currentPollen=getPollenForHour(pollenData,hourIdx);
  var score=calcScore(currentPollen);
  var level=getScoreLevel(score);

  var weather={
    temp:weatherData.current?weatherData.current.temperature_2m:null,
    humidity:weatherData.current?weatherData.current.relative_humidity_2m:null,
    wind:weatherData.current?weatherData.current.wind_speed_10m:null,
    rain:weatherData.current?weatherData.current.rain:null,
    tempMax:weatherData.daily?weatherData.daily.temperature_2m_max[0]:null,
    tempMin:weatherData.daily?weatherData.daily.temperature_2m_min[0]:null
  };

  var phrase=getPhrase(score,weather);
  var circumference=2*Math.PI*75;
  var pct=score/10;
  var dashOffset=circumference*(1-pct);

  // Forecasts
  var forecasts=[];
  var dayAfter=new Date();dayAfter.setDate(dayAfter.getDate()+2);
  var dayNames=['Today','Tomorrow',dayAfter.toLocaleDateString('en-US',{weekday:'long'})];
  for(var d=0;d<3;d++){
    var avg=getDayAverage(pollenData,d);
    var ds=calcScore(avg);
    var dl=getScoreLevel(ds);
    forecasts.push({day:dayNames[d],score:ds,level:dl});
  }

  // Personal relevance
  var personalTypes=state.allergies||[];
  var relevantWarnings=[];
  if(personalTypes.length>0 && personalTypes[0]!=='not_sure'){
    POLLEN_TYPES.forEach(function(t){
      var tKey=t.label.toLowerCase();
      if(personalTypes.indexOf(tKey)>-1){
        var raw=currentPollen[t.key]||0;
        var pctVal=raw/t.max;
        if(pctVal>0.5){
          relevantWarnings.push(t.label+' pollen is HIGH \u2014 this affects your family!');
        }
      }
    });
  }

  var html='';

  // Safety Score
  html+='<section class="score-section animate-in" aria-label="Safety score">'+
    '<div class="score-ring" role="img" aria-label="Safety score '+score+' out of 10" style="--ring-glow-intensity:'+(score/10).toFixed(2)+'">'+
    '<svg viewBox="0 0 180 180"><circle class="bg-ring" cx="90" cy="90" r="75"/>'+
    '<circle class="fg-ring" cx="90" cy="90" r="75" style="stroke:'+level.color+
    ';stroke-dasharray:'+circumference+';stroke-dashoffset:'+dashOffset+'"/></svg>'+
    '<div class="score-number count-up" style="color:'+level.color+'" data-target-score="'+score.toFixed(1)+'">'+
    '0<span class="decimal">.0</span></div></div>'+
    '<div class="score-label" style="color:'+level.color+'">'+escapeHtml(level.label)+'</div>'+
    '<div class="score-sublabel">'+escapeHtml(level.sublabel)+'</div>'+
    '<div class="updated-ago" id="updated-ago" data-ts="'+Date.now()+'">Updated just now</div></section>';

  // Personal warnings
  if(relevantWarnings.length>0){
    html+='<div class="card animate-in delay-1" style="border-left:4px solid var(--danger-high);padding:14px 16px">';
    html+='<div class="card-title"><span aria-hidden="true">\u26a0\ufe0f</span> Personal Alert</div>';
    relevantWarnings.forEach(function(w){
      html+='<div style="font-size:0.9rem;font-weight:600;margin-bottom:4px">'+escapeHtml(w)+'</div>';
    });
    html+='</div>';
  }

  // Character comment
  html+='<div class="card comment-card animate-in delay-1" aria-label="Daily advice">'+
    '<div class="comment-header"><div class="avatar" aria-hidden="true">'+level.icon+'</div>'+
    '<div class="comment-name">PollenPal</div></div>'+
    '<div class="comment-text">'+escapeHtml(phrase)+'</div></div>';

  // Pollen breakdown
  html+='<div class="card animate-in delay-2" aria-label="Pollen breakdown">'+
    '<div class="card-title"><span aria-hidden="true">\ud83c\udf3e</span> Pollen Breakdown</div>';
  POLLEN_TYPES.forEach(function(t){
    var raw=currentPollen[t.key]||0;
    var pctW=Math.min(raw/t.max*100,100);
    var color=pollenBarColor(raw,t.max);
    var levelTxt=pctW<25?'Low':pctW<50?'Moderate':pctW<75?'High':'Very High';
    html+='<div class="pollen-item" role="meter" aria-label="'+escapeHtml(t.label)+' pollen" aria-valuenow="'+Math.round(raw)+'" aria-valuemin="0" aria-valuemax="'+t.max+'">'+
      '<div class="pollen-label">'+t.emoji+' '+escapeHtml(t.label)+'</div>'+
      '<div class="pollen-bar-bg"><div class="pollen-bar-fill" style="width:'+Math.max(pctW,2)+'%;background:'+color+'"></div></div>'+
      '<div class="pollen-value">'+Math.round(raw)+' <span style="font-size:0.65rem;opacity:0.7">'+escapeHtml(levelTxt)+'</span></div></div>';
  });
  html+='</div>';

  // 3-day forecast
  html+='<div class="card animate-in delay-3" aria-label="3-day forecast">'+
    '<div class="card-title"><span aria-hidden="true">\ud83d\udcc5</span> 3-Day Forecast</div>'+
    '<div class="forecast-row">';
  forecasts.forEach(function(f,i){
    html+='<div class="forecast-card stagger-in'+(i===0?' today':'')+'" data-stagger-delay="'+(i*100+100)+'" aria-label="'+escapeHtml(f.day)+': score '+f.score+'">'+
      '<div class="forecast-day">'+escapeHtml(f.day)+'</div>'+
      '<div class="forecast-icon">'+f.level.icon+'</div>'+
      '<div class="forecast-score" style="color:'+f.level.color+'">'+f.score.toFixed(1)+'</div>'+
      '<div class="forecast-label">'+escapeHtml(f.level.label)+'</div></div>';
  });
  html+='</div>';
  // Activity Recommendation (based on today's score)
  html+=renderActivityRec(score);
  html+='</div>';

  // Weather factors
  html+='<div class="card animate-in delay-4" aria-label="Weather factors">'+
    '<div class="card-title"><span aria-hidden="true">\ud83c\udf24\ufe0f</span> Weather Factors</div>'+
    '<div class="weather-grid">';

  var windEffect=weather.wind!=null?(weather.wind>20?'Spreads pollen':weather.wind>10?'Mild effect':'Low impact'):'--';
  var humidEffect=weather.humidity!=null?(weather.humidity>80?'Reduces airborne':weather.humidity>50?'Neutral':'Dries pollen'):'--';
  var rainEffect=weather.rain!=null?(weather.rain>0.5?'Washing pollen!':weather.rain>0?'Light help':'No rain'):'--';
  var tempEffect=weather.temp!=null?(weather.temp>25?'Boosts release':weather.temp>15?'Normal':'Slows pollen'):'--';

  var weatherItems=[
    {icon:'\ud83d\udca8',label:'Wind',value:(weather.wind!=null?weather.wind.toFixed(0)+' km/h':'--'),note:windEffect},
    {icon:'\ud83d\udca7',label:'Humidity',value:(weather.humidity!=null?weather.humidity+'%':'--'),note:humidEffect},
    {icon:'\ud83c\udf27\ufe0f',label:'Rain',value:(weather.rain!=null?weather.rain+' mm':'--'),note:rainEffect},
    {icon:'\ud83c\udf21\ufe0f',label:'Temp',value:(weather.temp!=null?weather.temp.toFixed(0)+'\u00b0C':'--'),note:tempEffect}
  ];
  weatherItems.forEach(function(w){
    html+='<div class="weather-item"><div class="weather-icon" aria-hidden="true">'+w.icon+'</div>'+
      '<div class="weather-info"><div class="label">'+escapeHtml(w.label)+'</div>'+
      '<div class="value">'+escapeHtml(w.value)+'</div>'+
      '<div class="label" style="font-size:0.65rem;margin-top:2px">'+escapeHtml(w.note)+'</div></div></div>';
  });
  html+='</div></div>';

  // v8: Outdoor Activity Planner
  html+=renderBestTimeCard(pollenData);

  // v8: Weekly Pollen Trend (SVG line chart)
  html+=renderWeeklyTrendChart(pollenData);

  // v8: Allergy Season Alert
  html+=renderAllergySeasonAlert(pollenData);

  // Pollen Calendar (7-day)
  html+=renderPollenCalendar(pollenData);

  // Medication Log
  html+=renderMedLog();

  // Medication Reminder toggle
  html+='<div class="card animate-in delay-4" aria-label="Medication reminder">'+
    '<div class="card-title"><span aria-hidden="true">\ud83d\udc8a</span> Medication Reminder</div>'+
    '<div class="med-toggle-row">'+
    '<span class="med-toggle-label"><span aria-hidden="true">\u23f0</span> Remind me to take allergy meds</span>'+
    '<label class="toggle-switch"><input type="checkbox" id="med-toggle" '+(state.medReminder?'checked':'')+
    ' aria-label="Enable medication reminder"><span class="toggle-slider"></span></label></div>'+
    '<div style="font-size:0.75rem;color:var(--text-secondary);margin-top:6px">'+
    'Shows a reminder banner when you open PollenPal in the morning</div></div>';

  // Alert Threshold
  html+=renderAlertThreshold(score);

  // Share button
  html+='<button class="btn-share animate-in delay-5" id="btn-share-score" aria-label="Share safety score">'+
    '<svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>'+
    'Share Safety Score</button>';

  // Share on X button
  html+='<button class="btn-share animate-in delay-5" id="btn-share-x" aria-label="Share on X" style="margin-top:8px;background:var(--bg-card);border:1px solid var(--border);color:var(--text)">'+
    '\uD835\uDD4F Share on X</button>';

  // Share Week Summary button
  html+='<button class="btn-share-week animate-in delay-5" id="btn-share-week" aria-label="Share 7-day forecast summary">'+
    '<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>'+
    'Copy Week Summary</button>';

  // Update time
  html+='<div style="text-align:center;padding:16px;font-size:0.75rem;color:var(--text-secondary)">'+
    'Updated '+new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})+
    ' \u2022 Data from Open-Meteo \u2022 v13</div>';

  // v13: Allergy Diary
  html+=renderAllergyDiary();

  $('content-area').innerHTML=html;

  // v6: Score countUp animation (0 -> target over 1s)
  var scoreEl=document.querySelector('.score-number[data-target-score]');
  if(scoreEl){
    var target=parseFloat(scoreEl.getAttribute('data-target-score'));
    var start=performance.now();
    var duration=1000;
    (function animateScore(){
      var elapsed=performance.now()-start;
      var progress=Math.min(elapsed/duration,1);
      var eased=1-Math.pow(1-progress,3);
      var current=target*eased;
      scoreEl.childNodes[0].textContent=Math.floor(current);
      var decimalSpan=scoreEl.querySelector('.decimal');
      if(decimalSpan) decimalSpan.textContent='.'+Math.round((current%1)*10);
      if(progress<1) requestAnimationFrame(animateScore);
    })();
  }

  // v6: Forecast card stagger
  var staggerCards=document.querySelectorAll('.forecast-card.stagger-in');
  staggerCards.forEach(function(card){
    var delay=parseInt(card.getAttribute('data-stagger-delay'))||100;
    setTimeout(function(){card.classList.add('stagger-visible');},delay);
  });

  // Bind share button
  var shareBtn=$('btn-share-score');
  if(shareBtn) shareBtn.addEventListener('click',shareScore);

  // Bind share week summary
  var shareWeekBtn=$('btn-share-week');
  if(shareWeekBtn) shareWeekBtn.addEventListener('click',shareWeekSummary);

  // Bind share on X
  var shareXBtn=$('btn-share-x');
  if(shareXBtn) shareXBtn.addEventListener('click',function(){
    var hourIdx=getCurrentHourIndex();
    var currentPollen=getPollenForHour(state.pollenData,hourIdx);
    var score=calcScore(currentPollen);
    var text='Safety score today: '+score.toFixed(1)+'/10 \uD83C\uDF3F Free pollen forecast: https://magic-dev-kz.github.io/pollenpal/';
    window.open('https://x.com/intent/tweet?text='+encodeURIComponent(text),'_blank','noopener');
  });

  // Bind medication log
  bindMedLog();

  // Bind medication toggle
  var medToggle=$('med-toggle');
  if(medToggle){
    medToggle.addEventListener('change',function(){
      state.medReminder=this.checked;
      LS.set('medReminder',this.checked);
      if(this.checked) checkMedReminder();
      else $('med-reminder-banner').innerHTML='';
    });
  }

  // Bind threshold slider
  bindThresholdSlider(score);

  // v13: Allergy diary
  initAllergyDiary();
}

/* ============ Data Loading ============ */
function loadData(){
  if(!state.location) return;
  var lat=state.location.lat;
  var lon=state.location.lon;

  $('city-name').textContent=state.location.name||'Unknown';
  $('safety-alert').innerHTML='';
  renderSkeleton();

  var btn=$('btn-refresh');
  btn.classList.add('refreshing');

  Promise.all([
    fetchPollenData(lat,lon),
    fetchWeatherData(lat,lon)
  ]).then(function(results){
    state.pollenData=results[0];
    state.weatherData=results[1];
    state.lastFetch=Date.now();
    LS.set('lastFetch',state.lastFetch);
    renderDashboard(state.pollenData,state.weatherData);
    // Safety alert
    var hourIdx=getCurrentHourIndex();
    var currentPollen=getPollenForHour(state.pollenData,hourIdx);
    var alertScore=calcScore(currentPollen);
    renderSafetyAlert(alertScore);
    checkMedReminder();
    updateFavButton();
    btn.classList.remove('refreshing');
  }).catch(function(err){
    console.error('Fetch error:',err);
    renderError('Unable to load pollen data. Please check your connection and try again.');
    btn.classList.remove('refreshing');
  });
}

function forceRefresh(){
  if(!state.location) return;
  var lat=state.location.lat.toFixed(2);
  var lon=state.location.lon.toFixed(2);
  LS.remove('pollen_'+lat+'_'+lon);
  LS.remove('weather_'+lat+'_'+lon);
  loadData();
}
window._ppRefresh=forceRefresh;

/* ============ Onboarding ============ */
function showOnboarding(){
  var ob=$('onboarding');
  ob.style.display='';
  var step=1;
  var selectedAllergies=[];
  var selectedLocation=null;

  function renderStep(){
    var html='<div class="ob-step-indicator">';
    for(var i=1;i<=3;i++){
      html+='<div class="ob-dot'+(i===step?' active':'')+'"></div>';
    }
    html+='</div>';

    if(step===1){
      html+='<h2>What allergies does your family have?</h2>'+
        '<p>Select all that apply so we can personalize your forecast.</p>'+
        '<div class="allergy-grid" role="group" aria-label="Allergy types">';
      var opts=[
        {key:'grass',emoji:'🌾',label:'Grass'},
        {key:'birch',emoji:'🌳',label:'Birch'},
        {key:'ragweed',emoji:'🌿',label:'Ragweed'},
        {key:'mugwort',emoji:'🍃',label:'Mugwort'},
        {key:'alder',emoji:'🪵',label:'Alder'},
        {key:'olive',emoji:'🫒',label:'Olive'},
        {key:'not_sure',emoji:'❓',label:'Not Sure'}
      ];
      opts.forEach(function(o){
        var sel=selectedAllergies.indexOf(o.key)>-1;
        html+='<button class="allergy-option'+(sel?' selected':'')+'" data-key="'+o.key+'" '+
          'role="checkbox" aria-checked="'+sel+'" aria-label="'+escapeHtml(o.label)+'">'+
          '<div class="check"></div><span>'+o.emoji+' '+escapeHtml(o.label)+'</span></button>';
      });
      html+='</div><button class="btn-primary" id="ob-next1">Continue</button>';
    }
    else if(step===2){
      html+='<h2>Where are you?</h2>'+
        '<p>We need your location to check local pollen levels.</p>'+
        '<button class="detect-btn" id="ob-detect">'+
        '<svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>'+
        'Detect My Location</button>'+
        '<div class="or-divider">or search manually</div>'+
        '<input type="text" class="ob-search" id="ob-search" placeholder="Type city name..." aria-label="Search city">'+
        '<div class="ob-results" id="ob-results" role="listbox"></div>';
      if(selectedLocation){
        html+='<div style="margin-bottom:16px;font-weight:700;color:var(--accent)">'+
          '\u2714 '+escapeHtml(selectedLocation.name+(selectedLocation.country?', '+selectedLocation.country:''))+'</div>';
      }
      html+='<button class="btn-primary" id="ob-next2"'+(selectedLocation?'':' disabled')+'>Continue</button>';
    }
    else if(step===3){
      html+='<div style="font-size:3rem;margin-bottom:16px" aria-hidden="true">\ud83c\udf3b</div>'+
        '<h2>You\'re All Set!</h2>'+
        '<p>PollenPal will help you plan around pollen so your family can breathe easy.</p>'+
        '<div style="text-align:left;width:100%;max-width:300px;margin:0 auto 24px">'+
        '<div style="margin-bottom:8px">\u2705 Personalized pollen alerts</div>'+
        '<div style="margin-bottom:8px">\u2705 3-day forecasts</div>'+
        '<div style="margin-bottom:8px">\u2705 Actionable daily advice</div>'+
        '<div>\u2705 No ads, no pill pushing</div></div>'+
        '<button class="btn-primary" id="ob-go">Let\'s Go!</button>';
    }

    $('ob-content').innerHTML=html;
    bindStepEvents();
  }

  function bindStepEvents(){
    if(step===1){
      var btns=document.querySelectorAll('.allergy-option');
      btns.forEach(function(b){
        b.addEventListener('click',function(){
          var key=this.getAttribute('data-key');
          if(key==='not_sure'){
            selectedAllergies=['not_sure'];
            // Deselect all others visually, select 'not_sure'
            btns.forEach(function(btn){
              if(btn.getAttribute('data-key')==='not_sure'){
                btn.classList.add('selected');
                btn.setAttribute('aria-checked','true');
              } else {
                btn.classList.remove('selected');
                btn.setAttribute('aria-checked','false');
              }
            });
          } else {
            var idx=selectedAllergies.indexOf('not_sure');
            if(idx>-1) selectedAllergies.splice(idx,1);
            idx=selectedAllergies.indexOf(key);
            if(idx>-1){
              selectedAllergies.splice(idx,1);
              this.classList.remove('selected');
              this.setAttribute('aria-checked','false');
            } else {
              selectedAllergies.push(key);
              this.classList.add('selected');
              this.setAttribute('aria-checked','true');
            }
            // Deselect 'not_sure' visually
            btns.forEach(function(btn){
              if(btn.getAttribute('data-key')==='not_sure'){
                btn.classList.remove('selected');
                btn.setAttribute('aria-checked','false');
              }
            });
          }
        });
      });
      $('ob-next1').addEventListener('click',function(){
        if(selectedAllergies.length===0) selectedAllergies=['not_sure'];
        state.allergies=selectedAllergies;
        LS.set('allergies',selectedAllergies);
        step=2;renderStep();
      });
    }
    else if(step===2){
      var detectBtn=$('ob-detect');
      if(detectBtn){
        detectBtn.addEventListener('click',function(){
          this.textContent='Detecting...';
          this.disabled=true;
          if(navigator.geolocation){
            navigator.geolocation.getCurrentPosition(function(pos){
              var lat=pos.coords.latitude;
              var lon=pos.coords.longitude;
              // Reverse geocode via Nominatim
              fetchJSON('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json')
              .then(function(geo){
                var cityName=(geo.address&&(geo.address.city||geo.address.town||geo.address.village))||null;
                var country=(geo.address&&geo.address.country)||'';
                if(cityName){
                  selectedLocation={name:cityName,lat:lat,lon:lon,country:country};
                } else {
                  selectedLocation={name:lat.toFixed(2)+', '+lon.toFixed(2),lat:lat,lon:lon,country:''};
                }
                renderStep();
              }).catch(function(){
                selectedLocation={name:lat.toFixed(2)+', '+lon.toFixed(2),lat:lat,lon:lon,country:''};
                renderStep();
              });
            },function(){
              detectBtn.textContent='Detection failed. Search below.';
              detectBtn.disabled=false;
            },{timeout:10000});
          } else {
            detectBtn.textContent='Geolocation not supported';
          }
        });
      }

      var searchEl=$('ob-search');
      var timer=null;
      if(searchEl){
        searchEl.addEventListener('input',function(){
          var q=searchEl.value.trim();
          clearTimeout(timer);
          if(q.length<2){$('ob-results').innerHTML='';return}
          timer=setTimeout(function(){
            searchCity(q).then(function(data){
              var res=$('ob-results');

/* ============ Focus Trap ============ */
function trapFocus(container){
  container.addEventListener('keydown',function(e){
    if(e.key!=='Tab') return;
    var focusable=container.querySelectorAll('button:not([disabled]),input:not([disabled]),[tabindex]:not([tabindex="-1"]),a[href],select,textarea');
    if(focusable.length===0){e.preventDefault();return}
    var first=focusable[0];
    var last=focusable[focusable.length-1];
    if(e.shiftKey){
      if(document.activeElement===first){e.preventDefault();last.focus()}
    } else {
      if(document.activeElement===last){e.preventDefault();first.focus()}
    }
  });
}

trapFocus($('search-modal'));

    var diff=Math.floor((Date.now()-ts)/1000);
    var text;
    if(diff<60) text='Updated just now';
    else if(diff<3600){
      var mins=Math.floor(diff/60);
      text='Updated '+mins+' min'+(mins>1?'s':'')+' ago';
    } else {
      var hrs=Math.floor(diff/3600);
      text='Updated '+hrs+' hour'+(hrs>1?'s':'')+' ago';
    }
    el.textContent=text;
  },30000); // update every 30s
}

var deferredInstallPrompt=null;

function initPWAInstallBanner(){
  var visits=1;
  try{
    visits=parseInt(localStorage.getItem('pp_visits')||'0')+1;
    localStorage.setItem('pp_visits',String(visits));
  }catch(e){}

  try{if(localStorage.getItem('pp_pwa_dismissed')) return}catch(e){}
  if(visits<2) return;
  if(window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone) return;

  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    deferredInstallPrompt=e;
    showInstallBanner();
  });
}

function showInstallBanner(){
  var banner=document.createElement('div');
  banner.className='pwa-install-banner';

    '<button class="pwa-install-banner__close" id="pwa-install-close" aria-label="Dismiss">&times;</button>';
  document.body.appendChild(banner);

  requestAnimationFrame(function(){requestAnimationFrame(function(){
    banner.classList.add('show');
  })});

  document.getElementById('pwa-install-btn').addEventListener('click',function(){
    if(deferredInstallPrompt){
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.then(function(){
        deferredInstallPrompt=null;
        dismissInstallBanner();

  document.getElementById('pwa-install-close').addEventListener('click',function(){

  return hiddenPollenTypes.indexOf(key)===-1;

function togglePollenType(key){
  var idx=hiddenPollenTypes.indexOf(key);

  else{hiddenPollenTypes.push(key)}

/* ============ v12: Daily Summary Notification Text ============ */
function getDailySummaryText(score,pollenData){
  var safetyText=score>=7?'Safe to go out':score>=4?'Use caution outdoors':'Stay indoors if possible';
  // Find dominant pollen type
  var hourIdx=getCurrentHourIndex();
  var currentPollen=getPollenForHour(pollenData,hourIdx);
  var highTypes=[];
  POLLEN_TYPES.forEach(function(t){
    var raw=currentPollen[t.key]||0;
    var pct=raw/t.max;
    if(pct>0.25){
      var lvl=pct<0.5?'moderate':pct<0.75?'high':'very high';
      highTypes.push(t.label+' pollen '+lvl);
    }
  });
  var pollenInfo=highTypes.length>0?highTypes[0]:'All pollen low';
  return 'Today: '+safetyText+'. '+pollenInfo+'.';
}

        chip.className='pollen-filter-chip '+(visible?'active-type':'hidden-type');
        chip.setAttribute('aria-label',(visible?'Hide ':'Show ')+t.label+' pollen');
        chip.setAttribute('aria-pressed',visible?'true':'false');
        chip.innerHTML=t.emoji+' '+t.label;
        chip.addEventListener('click',function(){
          togglePollenType(t.key);
          // Update visibility of corresponding pollen item
          var items=pollenCard.querySelectorAll('.pollen-item');
          items.forEach(function(item){
            var label=item.querySelector('.pollen-label');
            if(label&&label.textContent.indexOf(t.label)>-1){
              item.style.display=isPollenTypeVisible(t.key)?'':'none';
            }
          });
          this.classList.toggle('active-type');
          this.classList.toggle('hidden-type');
          this.setAttribute('aria-pressed',isPollenTypeVisible(t.key)?'true':'false');
          this.setAttribute('aria-label',(isPollenTypeVisible(t.key)?'Hide ':'Show ')+t.label+' pollen');
        });
        filterDiv.appendChild(chip);
      });
      cardTitle.parentNode.insertBefore(filterDiv,cardTitle.nextSibling);
    }
    // Apply initial hidden state
    var items=pollenCard.querySelectorAll('.pollen-item');
    items.forEach(function(item){
      var label=item.querySelector('.pollen-label');
      if(label){
        POLLEN_TYPES.forEach(function(t){

            item.style.display='none';
          }
        });
      }
    });
  }
};

      html+='<div style="display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.04)">';
      html+='<span style="font-size:18px;min-width:26px">'+escapeHtml(entry.emoji||'📝')+'</span>';
      html+='<div style="flex:1;min-width:0"><div style="font-size:0.8rem;color:var(--text-secondary)">'+escapeHtml(dayStr)+'</div>';
      html+='<div style="font-size:0.85rem;color:var(--text)">'+escapeHtml(entry.text)+'</div></div></div>';
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}
function initAllergyDiary(){
  var selectedEmoji='';
  var emojiRow=document.getElementById('diary-emoji-row');
  var textArea=document.getElementById('diary-text');
  var saveBtn=document.getElementById('diary-save-btn');
  if(!emojiRow||!textArea||!saveBtn) return;

  function updateSaveState(){
    var hasText=textArea.value.trim().length>0;
    var hasEmoji=selectedEmoji.length>0;
    if(hasText&&hasEmoji){
      saveBtn.disabled=false;
      saveBtn.style.opacity='1';
      saveBtn.style.pointerEvents='auto';
    }else{
      saveBtn.disabled=true;
      saveBtn.style.opacity='0.5';
      saveBtn.style.pointerEvents='none';
    }
  }

  emojiRow.addEventListener('click',function(e){
    var btn=e.target.closest('.diary-emoji-btn');
    if(!btn) return;
    selectedEmoji=btn.getAttribute('data-emoji');
    var allBtns=emojiRow.querySelectorAll('.diary-emoji-btn');
    allBtns.forEach(function(b){
      b.style.borderColor='var(--border)';
      b.style.transform='scale(1)';
      b.style.boxShadow='none';
    });
    btn.style.borderColor='var(--accent)';
    btn.style.transform='scale(1.15)';
    btn.style.boxShadow='0 2px 12px rgba(56,161,105,0.2)';
    updateSaveState();
  });

  textArea.addEventListener('input',updateSaveState);
  textArea.addEventListener('focus',function(){textArea.style.borderColor='var(--accent)';});
  textArea.addEventListener('blur',function(){textArea.style.borderColor='var(--border)';});

  saveBtn.addEventListener('click',function(){
    var text=textArea.value.trim();
    if(!text||!selectedEmoji) return;
    saveAllergyDiaryEntry(text,selectedEmoji);
    // Refresh the diary section
    if(state.pollenData&&state.weatherData){
      renderDashboard(state.pollenData,state.weatherData);
    }
  });
}

/* ============ Service Worker ============ */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(e){
    console.warn('SW registration failed:',e);
  });
}

/* ============ v7: Start Timers ============ */
initPWAInstallBanner();
startAutoRefresh();
startUpdatedAgoTicker();

})();
