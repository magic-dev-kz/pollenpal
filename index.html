<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PollenPal - Allergy Forecast for Families</title>
<meta name="description" content="Morning pollen forecast with actionable advice for allergy families. Know before you go outside.">
<meta name="theme-color" content="#F0FFF4">
<meta property="og:title" content="PollenPal — Allergy Weather Forecast">
<meta property="og:description" content="Check pollen levels before you go outside. Safety score for allergy sufferers. Free, no tracking.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://magic-dev-kz.github.io/pollenpal/">
<link rel="canonical" href="https://magic-dev-kz.github.io/pollenpal/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="PollenPal — Allergy Weather Forecast">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#F0FFF4;--bg-card:#FFFFFF;--text:#1A3A2A;--text-secondary:#3A5A4A;
--border:#C6F6D5;--accent:#38A169;--accent-light:#68D391;
--danger-low:#F6E05E;--danger-mid:#ED8936;--danger-high:#E53E3E;
--safe:#48BB78;--safe-light:#C6F6D5;
--radius:20px;--shadow:0 4px 24px rgba(26,58,42,0.07),0 1px 4px rgba(26,58,42,0.04);
--shadow-lg:0 8px 40px rgba(26,58,42,0.10),0 2px 8px rgba(26,58,42,0.06);
--shadow-card:0 4px 24px rgba(26,58,42,0.08),0 1px 4px rgba(26,58,42,0.04),0 0 0 1px rgba(198,246,213,0.15);
--shadow-glow:0 4px 30px rgba(56,161,105,0.18),0 0 60px rgba(56,161,105,0.06);
--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
--glass-bg:rgba(255,255,255,0.65);--glass-border:rgba(198,246,213,0.5);
--glow-green:0 4px 30px rgba(56,161,105,0.12);
--glow-sky:0 4px 30px rgba(104,211,145,0.10);
}
[data-theme="dark"]{
--bg:#0A1A12;--bg-card:#122A1C;--text:#D6F5E0;--text-secondary:#B5D4C0;
--border:#1A3A2A;--shadow:0 4px 24px rgba(0,0,0,0.3),0 1px 4px rgba(0,0,0,0.15);
--shadow-lg:0 8px 40px rgba(0,0,0,0.4),0 2px 8px rgba(0,0,0,0.2);
--shadow-card:0 4px 24px rgba(0,0,0,0.3),0 1px 4px rgba(0,0,0,0.15),0 0 0 1px rgba(26,58,42,0.3);
--shadow-glow:0 4px 30px rgba(56,161,105,0.22),0 0 60px rgba(56,161,105,0.08);
--glass-bg:rgba(18,42,28,0.7);--glass-border:rgba(26,58,42,0.5);
--glow-green:0 4px 30px rgba(56,161,105,0.18);
--glow-sky:0 4px 30px rgba(72,187,120,0.12);
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font);
background:
  radial-gradient(ellipse 80% 60% at 20% 10%,rgba(104,211,145,0.12) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 80% 80%,rgba(45,156,219,0.08) 0%,transparent 55%),
  radial-gradient(ellipse 70% 40% at 50% 50%,rgba(56,161,105,0.06) 0%,transparent 50%),
  linear-gradient(160deg,#e6f9ed 0%,#f0fff4 30%,#e0f7fa 60%,#f0fdf4 100%);
background-attachment:fixed;
color:var(--text);min-height:100vh;
line-height:1.6;transition:background .4s,color .4s}
[data-theme="dark"] body{
background:
  radial-gradient(ellipse 80% 60% at 20% 10%,rgba(56,161,105,0.08) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 80% 80%,rgba(45,156,219,0.06) 0%,transparent 55%),
  radial-gradient(ellipse 70% 40% at 50% 50%,rgba(72,187,120,0.04) 0%,transparent 50%),
  linear-gradient(160deg,#0A1A12 0%,#0d2218 30%,#081e1a 60%,#0A1A12 100%);
background-attachment:fixed;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit;color:inherit}
a{color:var(--accent)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--accent-light);border-radius:3px}
[data-theme="dark"] ::-webkit-scrollbar-thumb{background:var(--border)}

/* Layout */
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.main-content{padding:0 16px 40px}

/* Location Bar — glassmorphism */
.location-bar{position:sticky;top:0;z-index:100;
background:var(--glass-bg);
padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
border-bottom:1px solid var(--glass-border);
backdrop-filter:blur(20px) saturate(180%);
-webkit-backdrop-filter:blur(20px) saturate(180%);
transition:background .4s}
.location-bar .city{font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:8px;
letter-spacing:-0.02em}
.location-bar .city svg{width:18px;height:18px;fill:var(--accent);
filter:drop-shadow(0 1px 3px rgba(56,161,105,0.3))}
.location-bar .actions{display:flex;gap:6px;align-items:center}
.btn-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
justify-content:center;transition:background .25s,transform .2s,box-shadow .25s}
.btn-icon:hover,.btn-icon:focus-visible{background:var(--glass-bg);
box-shadow:var(--glow-green);transform:translateY(-2px) scale(1.08)}
.btn-icon:active{transform:scale(0.95)}
.btn-icon svg{width:18px;height:18px;fill:var(--text-secondary);transition:fill .2s}
.btn-icon:hover svg{fill:var(--accent)}

/* Safety Score */
.score-section{text-align:center;padding:36px 0 28px}
.score-ring{position:relative;width:190px;height:190px;margin:0 auto 20px;
filter:drop-shadow(0 6px 20px rgba(56,161,105,0.15));
--ring-glow-intensity:0.15}
.score-ring svg{width:190px;height:190px;transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:10}
.score-ring .bg-ring{stroke:var(--border);opacity:0.5}
.score-ring .fg-ring{stroke-linecap:round;
transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1),stroke .5s,filter .5s;
filter:drop-shadow(0 0 calc(4px + var(--ring-glow-intensity, 0.15) * 30px) currentColor);
stroke:url(#scoreGradient)}
.score-ring svg defs{display:block}
.score-number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
font-size:4.5rem;font-weight:900;line-height:1;letter-spacing:-0.03em;
background:linear-gradient(135deg,var(--accent) 0%,#2D9CDB 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text}
.score-number .decimal{font-size:2rem;font-weight:700}
.score-label{font-size:1.3rem;font-weight:900;margin-bottom:4px;letter-spacing:-0.02em}
.score-sublabel{font-size:0.875rem;color:var(--text-secondary);font-weight:500}

/* Cards — glassmorphism */
.card{background:var(--glass-bg);
border:1px solid var(--glass-border);
border-radius:var(--radius);padding:20px;margin-bottom:16px;
box-shadow:var(--shadow-card);
backdrop-filter:blur(20px) saturate(180%);
-webkit-backdrop-filter:blur(20px) saturate(180%);
transition:background .4s,border-color .3s,transform .35s cubic-bezier(0.34,1.56,0.64,1),box-shadow .35s;
animation:cardIn .6s cubic-bezier(0.34,1.56,0.64,1) both}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg),var(--glow-green)}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.card-title{font-size:0.78rem;font-weight:800;text-transform:uppercase;
letter-spacing:0.06em;color:var(--text-secondary);margin-bottom:12px;
display:flex;align-items:center;gap:6px}

/* Character Comment */
.comment-card{border-left:4px solid var(--accent);position:relative;
background:linear-gradient(135deg,var(--glass-bg) 0%,rgba(56,161,105,0.06) 100%)}
.comment-card .avatar{width:44px;height:44px;border-radius:50%;
background:linear-gradient(135deg,var(--accent-light),var(--accent));
display:flex;align-items:center;
justify-content:center;font-size:1.3rem;flex-shrink:0;
box-shadow:0 3px 12px rgba(56,161,105,0.2)}
.comment-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.comment-name{font-weight:800;font-size:0.95rem;letter-spacing:-0.01em}
.comment-text{font-size:0.95rem;line-height:1.7;color:var(--text)}

/* Pollen Bars — animated gradient fills */
.pollen-item{display:flex;align-items:center;gap:12px;margin-bottom:14px;
transition:transform .2s}
.pollen-item:hover{transform:translateX(4px)}
.pollen-item:last-child{margin-bottom:0}
.pollen-label{width:85px;font-size:0.8rem;font-weight:700;flex-shrink:0;
text-transform:capitalize;letter-spacing:0.01em}
.pollen-bar-bg{flex:1;height:10px;background:var(--border);border-radius:6px;
overflow:hidden;position:relative;opacity:0.7}
.pollen-bar-fill{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1);
min-width:2px;position:relative;
background-size:200% 100%;animation:pollenShimmer 3s ease-in-out infinite}
@keyframes pollenShimmer{
0%,100%{background-position:0% 50%;filter:brightness(1)}
50%{background-position:100% 50%;filter:brightness(1.15)}
}
.pollen-value{width:55px;text-align:right;font-size:0.8rem;font-weight:700;
color:var(--text-secondary);flex-shrink:0}

/* Forecast Cards — glassmorphism + hover */
.forecast-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:0}
.forecast-card{text-align:center;padding:18px 10px;border-radius:var(--radius);
background:var(--glass-bg);border:1px solid var(--glass-border);
box-shadow:var(--shadow-card);
backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);
transition:transform .35s cubic-bezier(0.34,1.56,0.64,1),box-shadow .35s,border-color .3s;
animation:cardIn .6s cubic-bezier(0.34,1.56,0.64,1) both}
.forecast-card:nth-child(1){animation-delay:.05s}
.forecast-card:nth-child(2){animation-delay:.1s}
.forecast-card:nth-child(3){animation-delay:.15s}
.forecast-card:hover{transform:translateY(-6px) scale(1.02);
box-shadow:var(--shadow-lg),var(--glow-green);border-color:var(--accent-light)}
.forecast-card.today{border-color:var(--accent);border-width:2px;
box-shadow:var(--shadow),0 4px 30px rgba(56,161,105,0.25),0 0 60px rgba(56,161,105,0.12)}
.forecast-day{font-size:0.72rem;font-weight:700;text-transform:uppercase;
color:var(--text-secondary);margin-bottom:8px;letter-spacing:0.05em}
.forecast-icon{font-size:2.2rem;margin-bottom:6px;
animation:iconFloat 4s ease-in-out infinite}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.forecast-score{font-size:1.6rem;font-weight:900;letter-spacing:-0.02em;
background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.forecast-label{font-size:0.7rem;color:var(--text-secondary);margin-top:3px;font-weight:500}

/* Weather Factors */
.weather-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.weather-item{display:flex;align-items:center;gap:10px;padding:14px;
border-radius:14px;background:var(--glass-bg);border:1px solid var(--glass-border);
backdrop-filter:blur(12px) saturate(160%);-webkit-backdrop-filter:blur(12px) saturate(160%);
transition:transform .3s cubic-bezier(0.34,1.56,0.64,1),box-shadow .3s;
animation:cardIn .5s cubic-bezier(0.34,1.56,0.64,1) both}
.weather-item:nth-child(1){animation-delay:.1s}
.weather-item:nth-child(2){animation-delay:.15s}
.weather-item:nth-child(3){animation-delay:.2s}
.weather-item:nth-child(4){animation-delay:.25s}
.weather-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg),var(--glow-sky)}
.weather-icon{font-size:1.4rem;width:36px;text-align:center;
animation:weatherPulse 3s ease-in-out infinite}
@keyframes weatherPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.weather-info .label{font-size:0.7rem;color:var(--text-secondary);text-transform:uppercase;
font-weight:700;letter-spacing:0.04em}
.weather-info .value{font-size:1.05rem;font-weight:800;
background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Theme Toggle */
.theme-toggle{position:relative}
.theme-toggle svg{transition:transform .4s cubic-bezier(0.4,0,0.2,1)}
.theme-toggle:hover svg{transform:rotate(30deg)}

/* Search Modal — glassmorphism */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;
display:flex;align-items:flex-start;justify-content:center;padding:60px 16px;
opacity:0;visibility:hidden;transition:opacity .35s,visibility .35s;
backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.modal-overlay.active{opacity:1;visibility:visible}
.modal{background:var(--glass-bg);border-radius:var(--radius);width:100%;
max-width:400px;padding:24px;
box-shadow:0 8px 40px rgba(0,0,0,0.15),var(--shadow-glow);
border:1px solid var(--glass-border);
backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
transform:translateY(-20px) scale(0.97);transition:transform .4s cubic-bezier(0.34,1.56,0.64,1)}
.modal-overlay.active .modal{transform:translateY(0) scale(1)}
.search-input{width:100%;padding:14px 16px;border:2px solid var(--glass-border);
border-radius:14px;font-size:1rem;background:var(--glass-bg);outline:none;
transition:border-color .25s,box-shadow .25s;font-weight:500}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(56,161,105,0.1),0 0 20px rgba(56,161,105,0.06)}
.search-results{margin-top:12px;max-height:240px;overflow-y:auto}
.search-result{padding:12px;border-radius:12px;cursor:pointer;
display:flex;align-items:center;gap:10px;transition:background .2s,transform .15s}
.search-result:hover,.search-result:focus-visible{background:var(--safe-light);transform:translateX(4px)}
[data-theme="dark"] .search-result:hover,[data-theme="dark"] .search-result:focus-visible{background:var(--border)}
.search-result .name{font-weight:700}
.search-result .country{font-size:0.8rem;color:var(--text-secondary);font-weight:500}

/* Onboarding — animated glow gradient background */
.onboarding-overlay{position:fixed;inset:0;z-index:300;
background:
  radial-gradient(ellipse 70% 50% at 30% 20%,rgba(104,211,145,0.18) 0%,transparent 60%),
  radial-gradient(ellipse 60% 60% at 70% 70%,rgba(45,156,219,0.12) 0%,transparent 55%),
  radial-gradient(ellipse 50% 40% at 50% 50%,rgba(56,161,105,0.08) 0%,transparent 50%),
  linear-gradient(160deg,#e6f9ed 0%,#f0fff4 40%,#e0f7fa 100%);
display:flex;flex-direction:column;transition:opacity .5s;
animation:obGlow 6s ease-in-out infinite alternate}
@keyframes obGlow{
0%{filter:brightness(1)}
50%{filter:brightness(1.02)}
100%{filter:brightness(1.04)}
}
[data-theme="dark"] .onboarding-overlay{
background:
  radial-gradient(ellipse 70% 50% at 30% 20%,rgba(56,161,105,0.12) 0%,transparent 60%),
  radial-gradient(ellipse 60% 60% at 70% 70%,rgba(45,156,219,0.08) 0%,transparent 55%),
  radial-gradient(ellipse 50% 40% at 50% 50%,rgba(72,187,120,0.06) 0%,transparent 50%),
  linear-gradient(160deg,#0A1A12 0%,#0d2218 40%,#081e1a 100%)}
.onboarding-overlay.fade-out{opacity:0;pointer-events:none}
.onboarding-content{flex:1;display:flex;flex-direction:column;
align-items:center;justify-content:center;padding:32px 24px;max-width:420px;margin:0 auto;text-align:center}
.onboarding-content h2{font-size:1.6rem;margin-bottom:10px;font-weight:900;letter-spacing:-0.02em;
animation:fadeInUp .6s cubic-bezier(0.34,1.56,0.64,1) both}
.onboarding-content p{color:var(--text-secondary);margin-bottom:24px;font-size:0.95rem;font-weight:500;line-height:1.6;
animation:fadeInUp .6s cubic-bezier(0.34,1.56,0.64,1) .1s both}
.ob-step-indicator{display:flex;gap:8px;margin-bottom:32px}
.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .4s cubic-bezier(0.4,0,0.2,1)}
.ob-dot.active{background:linear-gradient(135deg,var(--accent),#2D9CDB);width:28px;border-radius:4px;
box-shadow:0 2px 8px rgba(56,161,105,0.3)}
.allergy-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
width:100%;margin-bottom:24px}
.allergy-option{padding:18px 16px;border:2px solid var(--glass-border);border-radius:14px;
font-size:0.95rem;font-weight:600;transition:all .25s cubic-bezier(0.34,1.56,0.64,1);
display:flex;align-items:center;gap:10px;min-height:56px;
background:var(--glass-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
animation:cardIn .5s cubic-bezier(0.34,1.56,0.64,1) both}
.allergy-option:nth-child(1){animation-delay:.15s}
.allergy-option:nth-child(2){animation-delay:.2s}
.allergy-option:nth-child(3){animation-delay:.25s}
.allergy-option:nth-child(4){animation-delay:.3s}
.allergy-option:nth-child(5){animation-delay:.35s}
.allergy-option:nth-child(6){animation-delay:.4s}
.allergy-option:hover{border-color:var(--accent-light);transform:translateY(-2px);box-shadow:var(--glow-sky)}
.allergy-option.selected{border-color:var(--accent);
background:linear-gradient(135deg,rgba(56,161,105,0.1),rgba(104,211,145,0.15));
box-shadow:0 2px 12px rgba(56,161,105,0.15)}
[data-theme="dark"] .allergy-option.selected{background:rgba(56,161,105,0.15)}
.allergy-option .check{width:20px;height:20px;border:2px solid var(--border);
border-radius:6px;display:flex;align-items:center;justify-content:center;
transition:all .25s cubic-bezier(0.4,0,0.2,1);flex-shrink:0}
.allergy-option.selected .check{background:linear-gradient(135deg,var(--accent),#2D9CDB);
border-color:var(--accent);box-shadow:0 2px 6px rgba(56,161,105,0.3)}
.allergy-option.selected .check::after{content:'';width:6px;height:10px;
border:solid white;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
.btn-primary{background:linear-gradient(135deg,var(--accent) 0%,#2D9CDB 50%,var(--accent-light) 100%);
background-size:200% 200%;
color:white;padding:16px 40px;
border-radius:14px;font-size:1rem;font-weight:800;
transition:transform .25s cubic-bezier(0.34,1.56,0.64,1),opacity .15s,box-shadow .3s,background-position .4s;
width:100%;max-width:300px;box-shadow:0 4px 16px rgba(56,161,105,0.25),0 0 0 0 rgba(56,161,105,0);
letter-spacing:0.01em}
.btn-primary:hover{opacity:1;transform:translateY(-2px) scale(1.03);
box-shadow:0 8px 28px rgba(56,161,105,0.35),0 0 20px rgba(56,161,105,0.3);
background-position:100% 100%}
.btn-primary:active{transform:scale(0.95);box-shadow:0 2px 8px rgba(56,161,105,0.2)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{color:var(--text-secondary);padding:12px;font-size:0.9rem;font-weight:600}

/* Location detect */
.detect-btn{display:flex;align-items:center;gap:8px;padding:14px 20px;
border:2px solid var(--glass-border);border-radius:14px;font-size:0.95rem;
font-weight:600;width:100%;justify-content:center;margin-bottom:12px;
transition:border-color .25s,background .25s,transform .2s;
background:var(--glass-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.detect-btn:hover{border-color:var(--accent);background:rgba(56,161,105,0.05);transform:translateY(-2px);
box-shadow:var(--glow-sky)}
.detect-btn:active{transform:scale(0.95)}
.detect-btn svg{width:20px;height:20px;fill:var(--accent)}
.or-divider{color:var(--text-secondary);font-size:0.85rem;margin:8px 0;font-weight:500}
.ob-search{width:100%;padding:14px 16px;border:2px solid var(--glass-border);
border-radius:14px;font-size:1rem;background:var(--glass-bg);outline:none;
margin-bottom:8px;transition:border-color .25s,box-shadow .25s;font-weight:500;
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.ob-search:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(56,161,105,0.1),0 0 20px rgba(56,161,105,0.06)}
.ob-results{width:100%;max-height:180px;overflow-y:auto;margin-bottom:16px}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--safe-light) 50%,var(--border) 75%);
background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px}
[data-theme="dark"] .skeleton{background:linear-gradient(90deg,var(--border) 25%,#1A3A2A 50%,var(--border) 75%);background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-score{width:190px;height:190px;border-radius:50%;margin:0 auto 16px}
.skeleton-text{height:16px;margin-bottom:8px;width:60%}
.skeleton-card{height:120px;margin-bottom:16px;border-radius:var(--radius)}
.skeleton-bar{height:10px;margin-bottom:14px;border-radius:6px}

/* Error */
.error-card{border-color:var(--danger-mid);text-align:center;padding:32px;
background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.error-card .emoji{font-size:2.2rem;margin-bottom:10px}
.error-card p{margin-bottom:16px;color:var(--text-secondary);font-weight:500}
.btn-retry{background:linear-gradient(135deg,var(--accent),#2D9CDB);color:white;
padding:12px 28px;border-radius:12px;font-weight:700;font-size:0.9rem;
box-shadow:0 3px 12px rgba(56,161,105,0.2);transition:transform .2s,box-shadow .2s}
.btn-retry:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(56,161,105,0.3),0 0 20px rgba(56,161,105,0.1)}
.btn-retry:active{transform:scale(0.95)}

/* v12: Location quick-switch tabs */
.location-tabs{display:flex;gap:6px;overflow-x:auto;padding:8px 16px 4px;
-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-snap-type:x mandatory}
.location-tabs::-webkit-scrollbar{display:none}
.location-tab{flex-shrink:0;padding:8px 16px;border-radius:12px;font-size:0.82rem;
font-weight:700;border:1.5px solid var(--glass-border);background:var(--glass-bg);
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
transition:all .25s cubic-bezier(0.34,1.56,0.64,1);scroll-snap-align:start;
white-space:nowrap;cursor:pointer}
.location-tab:hover{border-color:var(--accent-light);transform:translateY(-1px);box-shadow:var(--glow-sky)}
.location-tab.active{border-color:var(--accent);
background:linear-gradient(135deg,rgba(56,161,105,0.15),rgba(104,211,145,0.1));
box-shadow:0 2px 12px rgba(56,161,105,0.2);color:var(--accent)}
.location-tab:active{transform:scale(0.95)}

/* v12: Pollen type filter */
.pollen-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pollen-filter-chip{padding:5px 12px;border-radius:10px;font-size:0.72rem;font-weight:700;
border:1.5px solid var(--glass-border);background:var(--glass-bg);
backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
transition:all .2s;cursor:pointer;display:flex;align-items:center;gap:4px}
.pollen-filter-chip:hover{border-color:var(--accent-light)}
.pollen-filter-chip.hidden-type{opacity:0.4;text-decoration:line-through}
.pollen-filter-chip.active-type{border-color:var(--accent);opacity:1;text-decoration:none}

/* v12: Daily summary notification text */
.daily-summary{padding:12px 16px;border-radius:14px;font-size:0.9rem;font-weight:600;
margin-bottom:12px;display:flex;align-items:center;gap:10px;
background:var(--glass-bg);border:1px solid var(--glass-border);
backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
animation:cardIn .5s cubic-bezier(0.34,1.56,0.64,1) both}
.daily-summary-icon{font-size:1.2rem;flex-shrink:0}
.daily-summary-text{flex:1;line-height:1.4}

/* Responsive */
@media(max-width:380px){
.forecast-row{grid-template-columns:repeat(3,1fr);gap:6px}
.forecast-card{padding:12px 4px}
.weather-grid{grid-template-columns:1fr}
.allergy-grid{grid-template-columns:1fr}
.score-ring{width:150px;height:150px}
.score-ring svg{width:150px;height:150px}
.score-number{font-size:2.8rem}
.main-content{padding:0 12px 32px}
.location-bar{padding:12px}
}
@media(max-width:480px){
.weather-item{padding:12px 10px}
.card{padding:16px}
}
@media(min-width:768px){
.app{max-width:520px}
}

/* Safety Alert Banner */
.safety-alert{padding:14px 16px;display:flex;align-items:center;gap:10px;
font-size:0.9rem;font-weight:600;position:relative;animation:slideDown .5s cubic-bezier(0.4,0,0.2,1) both;
border-radius:0 0 16px 16px;margin:0 8px}
.safety-alert .alert-icon{font-size:1.2rem;flex-shrink:0}
.safety-alert .alert-text{flex:1}
.safety-alert .alert-sub{font-size:0.78rem;font-weight:500;opacity:0.85;display:block;margin-top:2px}
.safety-alert .alert-close{width:28px;height:28px;border-radius:50%;display:flex;
align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;
background:rgba(255,255,255,0.2);transition:background .2s,transform .2s}
.safety-alert .alert-close:hover{background:rgba(255,255,255,0.35);transform:scale(1.1)}
.safety-alert-danger{background:linear-gradient(135deg,#E53E3E,#C53030);color:#fff;
box-shadow:0 4px 20px rgba(229,62,62,0.25)}
.safety-alert-warning{background:linear-gradient(135deg,#DD6B20,#C05621);color:#fff;
box-shadow:0 4px 20px rgba(192,86,33,0.25)}
.safety-alert-good{background:linear-gradient(135deg,#38A169,#2D9CDB);color:#fff;
box-shadow:0 4px 20px rgba(56,161,105,0.25)}
@keyframes slideDown{from{opacity:0;transform:translateY(-100%)}to{opacity:1;transform:translateY(0)}}

/* Favorite Locations */
.saved-locations{margin-bottom:16px}
.saved-locations .card-title{margin-bottom:8px}
.saved-loc-item{display:flex;align-items:center;gap:10px;padding:14px;
border-radius:14px;cursor:pointer;
transition:background .2s,transform .3s cubic-bezier(0.34,1.56,0.64,1),box-shadow .3s;
border:1px solid var(--glass-border);
margin-bottom:8px;background:var(--glass-bg);
backdrop-filter:blur(12px) saturate(160%);-webkit-backdrop-filter:blur(12px) saturate(160%);
animation:cardIn .5s cubic-bezier(0.34,1.56,0.64,1) both}
.saved-loc-item:nth-child(2){animation-delay:.06s}
.saved-loc-item:nth-child(3){animation-delay:.12s}
.saved-loc-item:nth-child(4){animation-delay:.18s}
.saved-loc-item:nth-child(5){animation-delay:.24s}
.saved-loc-item:nth-child(6){animation-delay:.3s}
.saved-loc-item:hover,.saved-loc-item:focus-visible{
background:rgba(56,161,105,0.08);
transform:translateX(4px);
box-shadow:var(--glow-green);
outline:2px solid var(--accent);outline-offset:-2px}
.max-loc-toast{color:#E53E3E;font-size:0.85rem;position:absolute;top:100%;left:50%;transform:translateX(-50%);white-space:nowrap;pointer-events:none;margin-top:4px;
font-weight:600}
[data-theme="dark"] .saved-loc-item:hover{background:var(--border)}
.saved-loc-item .loc-icon{width:34px;height:34px;border-radius:50%;
background:linear-gradient(135deg,var(--safe-light),rgba(56,161,105,0.15));
display:flex;align-items:center;justify-content:center;flex-shrink:0}
[data-theme="dark"] .saved-loc-item .loc-icon{background:var(--border)}
.saved-loc-item .loc-icon svg{width:16px;height:16px;fill:var(--accent)}
.saved-loc-item .loc-name{font-weight:700;font-size:0.95rem;flex:1}
.saved-loc-item .loc-remove{width:28px;height:28px;border-radius:50%;display:flex;
align-items:center;justify-content:center;color:var(--text-secondary);font-size:0.9rem;
transition:background .2s,color .2s,transform .2s;flex-shrink:0}
.saved-loc-item .loc-remove:hover{background:rgba(229,62,62,0.1);color:#E53E3E;transform:scale(1.15)}
.btn-fav{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
justify-content:center;font-size:1.1rem;transition:transform .25s cubic-bezier(0.4,0,0.2,1),background .2s;position:relative}
.btn-fav:hover{background:var(--glass-bg);transform:scale(1.2)}
.btn-fav.is-fav{color:#ECC94B;filter:drop-shadow(0 2px 4px rgba(236,201,75,0.4))}
.saved-empty{text-align:center;padding:28px;color:var(--text-secondary);font-size:0.9rem;font-weight:500}

/* Share Button */
.btn-share{display:flex;align-items:center;justify-content:center;gap:8px;
width:100%;padding:14px;border:2px solid var(--accent);border-radius:14px;
font-size:0.95rem;font-weight:700;color:var(--accent);margin-top:8px;
transition:background .25s,color .25s,transform .2s,box-shadow .25s;
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.btn-share:hover{background:linear-gradient(135deg,var(--accent),#2D9CDB);color:#fff;
transform:translateY(-2px) scale(1.01);box-shadow:0 4px 16px rgba(56,161,105,0.25),0 0 20px rgba(56,161,105,0.1);border-color:transparent}
.btn-share:active{transform:scale(0.95)}
.btn-share svg{width:18px;height:18px;fill:currentColor}

/* Medication Reminder Banner */
.med-banner{padding:14px 16px;display:flex;align-items:center;gap:10px;
background:linear-gradient(135deg,#6B46C1,#805AD5);color:#fff;
border-radius:0 0 16px 16px;margin:0 8px;font-size:0.9rem;font-weight:600;
animation:slideDown .5s cubic-bezier(0.4,0,0.2,1) both;
box-shadow:0 4px 20px rgba(107,70,193,0.25)}
.med-banner .med-icon{font-size:1.2rem;flex-shrink:0}
.med-banner .med-text{flex:1}
.med-banner .med-dismiss{width:28px;height:28px;border-radius:50%;display:flex;
align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;
background:rgba(255,255,255,0.2);transition:background .2s,transform .2s;color:#fff}
.med-banner .med-dismiss:hover{background:rgba(255,255,255,0.35);transform:scale(1.1)}

/* Medication Reminder Toggle */
.med-toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:4px 0}
.med-toggle-label{font-size:0.9rem;font-weight:600;display:flex;align-items:center;gap:8px}
.toggle-switch{position:relative;width:48px;height:26px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);
border-radius:13px;transition:background .3s}
.toggle-slider::before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;
background:#fff;border-radius:50%;transition:transform .3s;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.toggle-switch input:checked+.toggle-slider{background:linear-gradient(135deg,#6B46C1,#805AD5)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(22px)}
.toggle-switch input:focus-visible+.toggle-slider{outline:2px solid var(--accent);outline-offset:2px}

/* Pollen Calendar */
.pollen-calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
.cal-day{text-align:center;border-radius:10px;padding:8px 4px;
transition:transform .2s,box-shadow .2s;cursor:default}
.cal-day:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.cal-day-name{font-size:0.6rem;font-weight:700;text-transform:uppercase;
color:var(--text-secondary);letter-spacing:0.04em;margin-bottom:4px}
.cal-day-num{font-size:0.85rem;font-weight:800;margin-bottom:4px}
.cal-day-dot{width:8px;height:8px;border-radius:50%;margin:0 auto}
.cal-day.cal-safe{background:rgba(56,161,105,0.12)}
.cal-day.cal-moderate{background:rgba(183,121,31,0.12)}
.cal-day.cal-warning{background:rgba(192,86,33,0.12)}
.cal-day.cal-danger{background:rgba(229,62,62,0.12)}
[data-theme="dark"] .cal-day.cal-safe{background:rgba(56,161,105,0.18)}
[data-theme="dark"] .cal-day.cal-moderate{background:rgba(183,121,31,0.18)}
[data-theme="dark"] .cal-day.cal-warning{background:rgba(192,86,33,0.18)}
[data-theme="dark"] .cal-day.cal-danger{background:rgba(229,62,62,0.18)}
.cal-today{outline:2px solid var(--accent);outline-offset:-2px}

/* Alert Threshold Slider */
.threshold-row{margin-top:12px}
.threshold-label{font-size:0.85rem;font-weight:700;color:var(--text-secondary);margin-bottom:8px;
display:flex;align-items:center;justify-content:space-between}
.threshold-value{font-weight:800;color:var(--accent);font-size:1rem}
.threshold-slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;
border-radius:3px;background:var(--border);outline:none;transition:background .2s}
.threshold-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
width:22px;height:22px;border-radius:50%;
background:linear-gradient(135deg,var(--accent),#2D9CDB);cursor:pointer;
box-shadow:0 2px 8px rgba(56,161,105,0.3);transition:transform .2s}
.threshold-slider::-webkit-slider-thumb:hover{transform:scale(1.15)}
.threshold-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;border:none;
background:linear-gradient(135deg,var(--accent),#2D9CDB);cursor:pointer;
box-shadow:0 2px 8px rgba(56,161,105,0.3)}
.threshold-alert{margin-top:10px;padding:12px 14px;border-radius:12px;font-size:0.85rem;
font-weight:600;display:flex;align-items:center;gap:8px;
animation:slideDown .4s cubic-bezier(0.4,0,0.2,1) both}
.threshold-alert-active{background:linear-gradient(135deg,rgba(229,62,62,0.12),rgba(192,86,33,0.08));
color:#C53030;border:1px solid rgba(229,62,62,0.2)}
[data-theme="dark"] .threshold-alert-active{color:#FC8181;background:rgba(229,62,62,0.15);border-color:rgba(229,62,62,0.25)}

/* Animations */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes sectionFadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeInUp .6s cubic-bezier(0.34,1.56,0.64,1) both}
.delay-1{animation-delay:.1s}
.delay-2{animation-delay:.2s}
.delay-3{animation-delay:.3s}
.delay-4{animation-delay:.4s}
.delay-5{animation-delay:.5s}
.score-section{animation:sectionFadeIn .7s cubic-bezier(0.34,1.56,0.64,1) both}
.card:nth-child(2){animation-delay:.08s}
.card:nth-child(3){animation-delay:.16s}
.card:nth-child(4){animation-delay:.24s}
.card:nth-child(5){animation-delay:.32s}

/* Refresh anim */
.refreshing svg{animation:spin .8s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Print */
@media print{.location-bar{position:static}.modal-overlay,.onboarding-overlay{display:none!important}}

/* v8: Allergy Season Alert */
.allergy-season-banner{border-left:4px solid var(--danger-high);
background:linear-gradient(135deg,var(--glass-bg) 0%,rgba(229,62,62,0.06) 100%)}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;
transition-duration:0.01ms!important;scroll-behavior:auto!important}
.forecast-card:hover{transform:none}
.btn-primary:hover{transform:none}
.btn-primary:active{transform:none}
.btn-icon:hover,.btn-icon:focus-visible{transform:none}
.btn-icon:active{transform:none}
.btn-share:active,.btn-retry:active,.detect-btn:active{transform:none}
.forecast-icon{animation:none}
.weather-icon{animation:none}
.pollen-bar-fill{animation:none}
.card,.forecast-card,.weather-item,.allergy-option{animation:none}
.onboarding-overlay{animation:none}
.med-banner,.threshold-alert,.cal-day:hover{animation:none;transform:none}
.score-number.count-up{animation:none}
.forecast-card.stagger-in{opacity:1;transform:none}
}

/* Medication Log */
.med-log-btn{display:flex;align-items:center;justify-content:center;gap:8px;
width:100%;padding:14px;border-radius:14px;font-size:0.95rem;font-weight:700;
margin-top:10px;transition:background .25s,color .25s,transform .2s,box-shadow .25s;
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.med-log-btn-active{background:linear-gradient(135deg,var(--accent),#2D9CDB);color:#fff;
border:2px solid transparent;box-shadow:0 4px 16px rgba(56,161,105,0.25)}
.med-log-btn-active:hover{transform:translateY(-2px) scale(1.01);
box-shadow:0 6px 20px rgba(56,161,105,0.35)}
.med-log-btn-active:active{transform:scale(0.95)}
.med-log-btn-done{background:var(--glass-bg);color:var(--accent);
border:2px solid var(--accent);cursor:default}
.med-log-week{display:flex;gap:6px;margin-top:12px;justify-content:space-between}
.med-log-day{text-align:center;flex:1;padding:6px 2px;border-radius:10px;
background:var(--glass-bg);border:1px solid var(--glass-border);font-size:0.7rem;font-weight:700}
.med-log-day-name{color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.03em;margin-bottom:4px}
.med-log-day-status{font-size:1rem}
.med-log-timestamp{font-size:0.72rem;color:var(--text-secondary);margin-top:8px;text-align:center}

/* Activity Recommendation */
.activity-rec{display:flex;align-items:center;gap:10px;padding:14px 16px;
border-radius:14px;margin-top:10px;font-size:0.9rem;font-weight:600;
background:var(--glass-bg);border:1px solid var(--glass-border);
backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.activity-rec-icon{font-size:1.3rem;flex-shrink:0}
.activity-rec-good{border-color:rgba(56,161,105,0.3);color:#38A169}
[data-theme="dark"] .activity-rec-good{color:#68D391}
.activity-rec-limit{border-color:rgba(183,121,31,0.3);color:#B7791F}
[data-theme="dark"] .activity-rec-limit{color:#ECC94B}
.activity-rec-stay{border-color:rgba(229,62,62,0.3);color:#E53E3E}
[data-theme="dark"] .activity-rec-stay{color:#FC8181}

/* Share Week Summary */
.btn-share-week{display:flex;align-items:center;justify-content:center;gap:8px;
width:100%;padding:14px;border:2px solid var(--text-secondary);border-radius:14px;
font-size:0.95rem;font-weight:700;color:var(--text-secondary);margin-top:8px;
transition:background .25s,color .25s,transform .2s,box-shadow .25s;
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.btn-share-week:hover{background:var(--text-secondary);color:var(--bg);
transform:translateY(-2px) scale(1.01);box-shadow:0 4px 16px rgba(0,0,0,0.15);border-color:transparent}
.btn-share-week:active{transform:scale(0.95)}
.btn-share-week svg{width:18px;height:18px;fill:currentColor}
.copied-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
background:var(--accent);color:#fff;padding:12px 24px;border-radius:12px;font-size:0.9rem;
font-weight:700;box-shadow:0 4px 20px rgba(56,161,105,0.3);z-index:400;
animation:slideUp .4s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* v6: Medication taken toast */
.med-taken-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
background:linear-gradient(135deg,#38A169,#2F855A);color:#fff;padding:14px 28px;border-radius:14px;
font-size:0.95rem;font-weight:700;box-shadow:0 4px 24px rgba(56,161,105,0.35);z-index:400;
animation:slideUp .4s cubic-bezier(0.34,1.56,0.64,1) both}

/* v6: Score countUp animation */
@keyframes countUp{from{opacity:0;transform:translate(-50%,-50%) scale(0.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.score-number.count-up{animation:countUp .6s cubic-bezier(0.34,1.56,0.64,1) both}

/* v6: Forecast card stagger */
.forecast-card.stagger-in{opacity:0;transform:translateY(20px) scale(0.95)}
.forecast-card.stagger-visible{opacity:1;transform:translateY(0) scale(1);
transition:opacity .4s cubic-bezier(0.34,1.56,0.64,1),transform .4s cubic-bezier(0.34,1.56,0.64,1)}

/* v6: Focus-visible for all interactive elements */
a:focus-visible,.btn-primary:focus-visible,.btn-secondary:focus-visible,
.btn-retry:focus-visible,.btn-share:focus-visible,.btn-share-week:focus-visible,
.btn-fav:focus-visible,.med-log-btn:focus-visible,.detect-btn:focus-visible,
.allergy-option:focus-visible,.ob-search:focus-visible,.search-input:focus-visible,
.threshold-slider:focus-visible,.alert-close:focus-visible,.med-dismiss:focus-visible,
input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
/* v7: PWA Install Banner */
.pwa-install-banner{position:fixed;bottom:0;left:0;right:0;z-index:250;
background:var(--glass-bg);backdrop-filter:blur(20px) saturate(180%);
-webkit-backdrop-filter:blur(20px) saturate(180%);
border-top:1px solid var(--glass-border);
box-shadow:0 -4px 24px rgba(0,0,0,0.1);
padding:14px 16px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));
display:flex;align-items:center;gap:12px;
transform:translateY(100%);transition:transform .35s cubic-bezier(0.4,0,0.2,1)}
.pwa-install-banner.show{transform:translateY(0)}
.pwa-install-banner__icon{width:40px;height:40px;border-radius:10px;
background:linear-gradient(135deg,var(--accent),#2D9CDB);
display:flex;align-items:center;justify-content:center;flex-shrink:0;
box-shadow:0 2px 10px rgba(56,161,105,0.25)}
.pwa-install-banner__icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}
.pwa-install-banner__text{flex:1;min-width:0}
.pwa-install-banner__title{font-size:0.9rem;font-weight:700}

<script>
(function(){'use strict';

/* ============ Utilities ============ */
function escapeHtml(s){
  if(typeof s!=='string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function $(id){return document.getElementById(id)}
function qs(sel){return document.querySelector(sel)}

var LS={
  get:function(k){try{var v=localStorage.getItem('pp_'+k);return v?JSON.parse(v):null}catch(e){return null}},
  set:function(k,v){try{localStorage.setItem('pp_'+k,JSON.stringify(v))}catch(e){}},
  remove:function(k){try{localStorage.removeItem('pp_'+k)}catch(e){}}
};

/* ============ State ============ */
var state={
  location:LS.get('location')||null,
  allergies:LS.get('allergies')||null,
  onboarded:LS.get('onboarded')||false,
  theme:LS.get('theme')||'light',
  pollenData:null,
  weatherData:null,
  lastFetch:LS.get('lastFetch')||0,
  medReminder:LS.get('medReminder')||false,
  medDismissedDate:LS.get('medDismissedDate')||null,
  alertThreshold:LS.get('alertThreshold')!=null?LS.get('alertThreshold'):4,
  medLog:LS.get('medLog')||{}
};

/* ============ Favorite Locations ============ */
var MAX_SAVED_LOCATIONS=5;

function getSavedLocations(){
  return LS.get('locations')||[];
}

function saveLocation(loc){
  var locs=getSavedLocations();
  // Check if already saved (by lat/lon proximity)
  for(var i=0;i<locs.length;i++){
    if(Math.abs(locs[i].lat-loc.lat)<0.01 && Math.abs(locs[i].lon-loc.lon)<0.01) return false;
  }
  if(locs.length>=MAX_SAVED_LOCATIONS) return false;
  locs.push({name:loc.name,lat:loc.lat,lon:loc.lon});
  LS.set('locations',locs);
  return true;
}

function removeLocation(idx){
  var locs=getSavedLocations();
  if(idx>=0&&idx<locs.length){
    locs.splice(idx,1);
    LS.set('locations',locs);
  }
}

function isLocationSaved(loc){
  if(!loc) return false;
  var locs=getSavedLocations();
  for(var i=0;i<locs.length;i++){
    if(Math.abs(locs[i].lat-loc.lat)<0.01 && Math.abs(locs[i].lon-loc.lon)<0.01) return true;
  }
  return false;
}

function updateFavButton(){
  var btn=$('btn-fav');
  if(!state.location){btn.style.display='none';return}
  btn.style.display='';
  var saved=isLocationSaved(state.location);
  btn.innerHTML=saved?'&#9733;':'&#9734;';
  btn.classList.toggle('is-fav',saved);
  btn.setAttribute('aria-label',saved?'Remove from saved':'Save location');
  btn.title=saved?'Remove from saved':'Save location';
}

function renderSavedLocations(){
  var locs=getSavedLocations();
  if(locs.length===0){
    $('content-area').innerHTML=
      '<div class="saved-locations">'+
      '<div class="card-title" style="padding-top:24px"><span aria-hidden="true">\ud83c\udf3b</span> Welcome to PollenPal</div>'+
      '<div class="saved-empty">Search for a city to get started.<br>Your saved locations will appear here.</div></div>';
    return;
  }
  var html='<div class="saved-locations" style="padding-top:16px">'+
    '<div class="card-title"><span aria-hidden="true">\u2b50</span> Saved Locations</div>';
  locs.forEach(function(loc,i){
    html+='<div class="saved-loc-item" tabindex="0" role="button" aria-label="Load '+escapeHtml(loc.name)+'" data-idx="'+i+'" data-lat="'+loc.lat+'" data-lon="'+loc.lon+'" data-name="'+escapeHtml(loc.name)+'">'+
      '<div class="loc-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg></div>'+
      '<div class="loc-name">'+escapeHtml(loc.name)+'</div>'+
      '<button class="loc-remove" data-idx="'+i+'" aria-label="Remove '+escapeHtml(loc.name)+'" title="Remove">&times;</button></div>';
  });
  html+='</div>';
  $('content-area').innerHTML=html;

  // Bind click and keyboard events
  function handleLocItemActivate(el){
    var lat=parseFloat(el.getAttribute('data-lat'));
    var lon=parseFloat(el.getAttribute('data-lon'));
    var name=el.getAttribute('data-name');
    state.location={name:name,lat:lat,lon:lon};
    LS.set('location',state.location);
    updateFavButton();
    loadData();
  }
  document.querySelectorAll('.saved-loc-item').forEach(function(el){
    el.addEventListener('click',function(e){
      if(e.target.closest('.loc-remove')) return;
      handleLocItemActivate(this);
    });
    el.addEventListener('keydown',function(e){
      if(e.key==='Enter'||e.key===' '){
        e.preventDefault();
        if(e.target.closest('.loc-remove')) return;
        handleLocItemActivate(this);
      }
    });
  });
  document.querySelectorAll('.loc-remove').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var idx=parseInt(this.getAttribute('data-idx'));
      removeLocation(idx);
      renderSavedLocations();
      updateFavButton();
    });
  });
}

/* ============ Safety Alert ============ */
function renderSafetyAlert(score){
  var container=$('safety-alert');
  if(!container) return;
  var html='';
  var threshold=state.alertThreshold;
  // Custom threshold alert takes priority if score is below threshold
  if(score<threshold && threshold>3){
    html='<div class="safety-alert safety-alert-danger" role="alert">'+
      '<span class="alert-icon" aria-hidden="true">\u26a0\ufe0f</span>'+
      '<div class="alert-text">Below your alert threshold! Score: '+score.toFixed(1)+'/10 (threshold: '+threshold+')'+
      '<span class="alert-sub">Consider staying indoors or taking precautions</span></div>'+
      '<button class="alert-close" aria-label="Dismiss alert">&times;</button></div>';
  } else if(score<3){
    html='<div class="safety-alert safety-alert-danger" role="alert">'+
      '<span class="alert-icon" aria-hidden="true">\u26a0\ufe0f</span>'+
      '<div class="alert-text">High pollen alert! Safety Score: '+score.toFixed(1)+'/10'+
      '<span class="alert-sub">Consider staying indoors or wearing a mask</span></div>'+
      '<button class="alert-close" aria-label="Dismiss alert">&times;</button></div>';
  } else if(score<5){
    html='<div class="safety-alert safety-alert-warning" role="alert">'+
      '<span class="alert-icon" aria-hidden="true">\u26a0\ufe0f</span>'+
      '<div class="alert-text">Elevated pollen levels! Safety Score: '+score.toFixed(1)+'/10'+
      '<span class="alert-sub">Take precautions before going outside</span></div>'+
      '<button class="alert-close" aria-label="Dismiss alert">&times;</button></div>';
  } else if(score>8){
    html='<div class="safety-alert safety-alert-good" role="alert">'+
      '<span class="alert-icon" aria-hidden="true">\ud83c\udf3f</span>'+
      '<div class="alert-text">Great day to go outside!'+
      '<span class="alert-sub">Safety Score: '+score.toFixed(1)+'/10 — Enjoy the fresh air</span></div>'+
      '<button class="alert-close" aria-label="Dismiss alert">&times;</button></div>';
  }
  container.innerHTML=html;
  var closeBtn=container.querySelector('.alert-close');
  if(closeBtn){
    closeBtn.addEventListener('click',function(){
      container.innerHTML='';
    });
  }
}

/* ============ Medication Reminder ============ */
function checkMedReminder(){
  if(!state.medReminder) return;
  var now=new Date();
  var todayStr=now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
  // Already dismissed today
  if(state.medDismissedDate===todayStr) return;
  // Show banner if before noon (morning reminder)
  if(now.getHours()<12){
    var container=$('med-reminder-banner');
    if(!container) return;
    container.innerHTML='<div class="med-banner" role="alert">'+
      '<span class="med-icon" aria-hidden="true">\ud83d\udc8a</span>'+
      '<div class="med-text">Don\'t forget your allergy medicine!'+
      '<span style="display:block;font-size:0.78rem;font-weight:500;opacity:0.85;margin-top:2px">Take it 30 min before going outside for best effect</span></div>'+
      '<button class="med-dismiss" aria-label="Dismiss reminder">&times;</button></div>';
    container.querySelector('.med-dismiss').addEventListener('click',function(){
      container.innerHTML='';
      state.medDismissedDate=todayStr;
      LS.set('medDismissedDate',todayStr);
    });
  }
}

/* ============ Medication Log ============ */
function getMedLog(){
  return LS.get('medLog')||{};
}

function logMedTaken(){
  var log=getMedLog();
  var now=new Date();
  var key=now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
  log[key]={taken:true,time:now.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})};
  LS.set('medLog',log);
  return log;
}

function isMedTakenToday(){
  var log=getMedLog();
  var now=new Date();
  var key=now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
  return log[key]&&log[key].taken;
}

function getMedTodayTime(){
  var log=getMedLog();
  var now=new Date();
  var key=now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
  return log[key]?log[key].time:null;
}

function renderMedLog(){
  var log=getMedLog();
  var today=new Date();
  var takenToday=isMedTakenToday();
  var todayTime=getMedTodayTime();
  var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  var html='<div class="card animate-in delay-4" aria-label="Medication log">';
  html+='<div class="card-title"><span aria-hidden="true">\uD83D\uDCCA</span> Medication Log</div>';

  // "Took my meds" button
  if(takenToday){
    html+='<button class="med-log-btn med-log-btn-done" id="btn-med-log" disabled aria-label="Already logged medication today">\u2705 Took my meds</button>';
    if(todayTime) html+='<div class="med-log-timestamp">Logged at '+escapeHtml(todayTime)+'</div>';
  } else {
    html+='<button class="med-log-btn med-log-btn-active" id="btn-med-log" aria-label="Log that you took your medication">\uD83D\uDC8A Took my meds</button>';
  }

  // Weekly view
  html+='<div class="med-log-week">';
  // Show current week (Mon-Sun)
  var startOfWeek=new Date(today);
  var dow=today.getDay();
  var mondayOffset=dow===0?-6:1-dow;
  startOfWeek.setDate(today.getDate()+mondayOffset);

  for(var i=0;i<7;i++){
    var d=new Date(startOfWeek);
    d.setDate(startOfWeek.getDate()+i);
    var key=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    var isFuture=d>today;
    var isToday=d.toDateString()===today.toDateString();
    var taken=log[key]&&log[key].taken;
    var status=isFuture?'\u2015':(taken?'\u2705':'\u274C');
    html+='<div class="med-log-day'+(isToday?' cal-today':'')+'" aria-label="'+dayNames[d.getDay()]+(taken?' taken':' missed')+'">'+
      '<div class="med-log-day-name">'+dayNames[d.getDay()]+'</div>'+
      '<div class="med-log-day-status">'+status+'</div></div>';
  }
  html+='</div></div>';
  return html;
}

function bindMedLog(){
  var btn=document.getElementById('btn-med-log');
  if(!btn||btn.disabled) return;
  btn.addEventListener('click',function(){
    logMedTaken();
    // v6: Show green toast
    var existingToast=document.querySelector('.med-taken-toast');
    if(existingToast) existingToast.remove();
    var toast=document.createElement('div');
    toast.className='med-taken-toast';
    toast.setAttribute('role','alert');
    toast.textContent='Logged! Stay safe \uD83C\uDF3F';
    document.body.appendChild(toast);
    setTimeout(function(){if(toast.parentNode)toast.remove();},2500);
    // Re-render just the med log card
    var card=btn.closest('.card');
    if(card){
      var temp=document.createElement('div');
      temp.innerHTML=renderMedLog();
      card.parentNode.replaceChild(temp.firstChild,card);
      bindMedLog();
    }
  });
}

/* ============ Activity Recommendation ============ */
function renderActivityRec(score){
  var icon,text,cssClass;
  if(score>=7){
    icon='\uD83C\uDFDE\uFE0F';
    text='Good for outdoor activities';
    cssClass='activity-rec-good';
  } else if(score>=4){
    icon='\u26A0\uFE0F';
    text='Limit outdoor time';
    cssClass='activity-rec-limit';
  } else {
    icon='\uD83C\uDFE0';
    text='Stay inside';
    cssClass='activity-rec-stay';
  }
  return '<div class="activity-rec '+cssClass+'" aria-label="Activity recommendation">'+
    '<span class="activity-rec-icon" aria-hidden="true">'+icon+'</span>'+
    '<span>'+escapeHtml(text)+'</span></div>';
}

/* ============ Share Week Summary ============ */
function shareWeekSummary(){
  if(!state.pollenData||!state.location) return;
  var today=new Date();
  var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var lines=[];
  lines.push('\uD83C\uDF3B PollenPal \u2014 7-Day Forecast');
  lines.push('\uD83D\uDCCD '+(state.location.name||'Unknown'));
  lines.push('');
  for(var d=0;d<7;d++){
    var date=new Date(today);
    date.setDate(today.getDate()+d);
    var avg=getDayAverage(state.pollenData,d);
    var s=calcScore(avg);
    var lvl=getScoreLevel(s);
    var dayLabel=d===0?'Today':d===1?'Tomorrow':dayNames[date.getDay()];
    var dateStr=(date.getMonth()+1)+'/'+date.getDate();
    var emoji=s>=7?'\uD83D\uDFE2':s>=4?'\uD83D\uDFE1':'\uD83D\uDD34';
    lines.push(emoji+' '+dayLabel+' ('+dateStr+'): '+s.toFixed(1)+'/10 \u2014 '+lvl.label);
  }
  lines.push('');
  lines.push('Checked with PollenPal \uD83C\uDF3B');
  var text=lines.join('\n');

  if(navigator.share){
    navigator.share({title:'PollenPal Week Summary',text:text}).catch(function(){});
  } else if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      showCopiedToast();
    }).catch(function(){
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showCopiedToast()}catch(e){}
  document.body.removeChild(ta);
}

function showCopiedToast(){
  var existing=document.querySelector('.copied-toast');
  if(existing) existing.remove();
  var toast=document.createElement('div');
  toast.className='copied-toast';
  toast.setAttribute('role','alert');
  toast.textContent='\u2705 Week summary copied to clipboard!';
  document.body.appendChild(toast);
  setTimeout(function(){if(toast.parentNode)toast.remove()},2500);
}

/* ============ v8: Outdoor Activity Planner ============ */
function renderBestTimeCard(pollenData){
  if(!pollenData||!pollenData.hourly||!pollenData.hourly.time) return '';
  // Find hour with lowest combined pollen today (first 24 hours)
  var bestHour=0;
  var bestScore=0;
  for(var h=0;h<24&&h<pollenData.hourly.time.length;h++){
    var pollen=getPollenForHour(pollenData,h);
    var sc=calcScore(pollen);
    if(sc>bestScore){bestScore=sc;bestHour=h;}
  }

  var now=new Date();
  var isPast=bestHour<now.getHours();
  var timeStr=(bestHour<10?'0':'')+bestHour+':00';
  var statusIcon=bestScore>=7?'\uD83C\uDF1F':bestScore>=4?'\u2600\uFE0F':'\u26C5';
  var statusText=bestScore>=7?'Excellent conditions':bestScore>=4?'Acceptable conditions':'Still elevated pollen';

  var html='<div class="card animate-in delay-3" aria-label="Best time to go outside">'+
    '<div class="card-title"><span aria-hidden="true">\u23F0</span> Best Time to Go Outside Today</div>'+
    '<div style="display:flex;align-items:center;gap:14px;padding:8px 0">'+
    '<div style="font-size:2.4rem;line-height:1">'+statusIcon+'</div>'+
    '<div><div style="font-size:1.3rem;font-weight:900;letter-spacing:-0.02em;'+
    'background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%);'+
    '-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">'+
    timeStr+'</div>'+
    '<div style="font-size:0.85rem;color:var(--text-secondary);font-weight:500">'+
    escapeHtml(statusText)+' (score: '+bestScore.toFixed(1)+'/10)'+
    (isPast?' \u2014 this hour has passed':'')+'</div></div></div></div>';
  return html;
}

/* ============ v8: Weekly Pollen Trend Chart ============ */
function renderWeeklyTrendChart(pollenData){
  if(!pollenData||!pollenData.hourly) return '';
  var scores=[];
  var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var today=new Date();
  var labels=[];
  for(var d=0;d<7;d++){
    var avg=getDayAverage(pollenData,d);
    var sc=calcScore(avg);
    scores.push(sc);
    var date=new Date(today);
    date.setDate(today.getDate()+d);
    labels.push(d===0?'Today':d===1?'Tmrw':dayNames[date.getDay()]);
  }

  // SVG line chart
  var w=320,h=100,padX=32,padY=16;
  var chartW=w-padX*2,chartH=h-padY*2;
  var points=[];
  for(var i=0;i<scores.length;i++){
    var x=padX+(chartW/(scores.length-1))*i;
    var y=padY+chartH-(scores[i]/10)*chartH;
    points.push({x:x,y:y,score:scores[i]});
  }

  var pathD='M'+points.map(function(p){return p.x+','+p.y}).join(' L');
  var areaD=pathD+' L'+points[points.length-1].x+','+(h-padY)+' L'+points[0].x+','+(h-padY)+' Z';

  var svg='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;display:block" aria-label="Weekly pollen trend chart">';
  // Gradient fill under line
  svg+='<defs><linearGradient id="trendFill" x1="0" y1="0" x2="0" y2="1">'+
    '<stop offset="0%" stop-color="var(--accent)" stop-opacity="0.25"/>'+
    '<stop offset="100%" stop-color="var(--accent)" stop-opacity="0.02"/>'+
    '</linearGradient></defs>';
  // Area fill
  svg+='<path d="'+areaD+'" fill="url(#trendFill)"/>';
  // Line
  svg+='<path d="'+pathD+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  // Dots and labels
  for(var j=0;j<points.length;j++){
    var col=scoreColor(points[j].score);
    svg+='<circle cx="'+points[j].x+'" cy="'+points[j].y+'" r="4" fill="'+col+'" stroke="var(--bg-card,#fff)" stroke-width="2"/>';
    svg+='<text x="'+points[j].x+'" y="'+(h-2)+'" text-anchor="middle" font-size="8" font-weight="700" fill="var(--text-secondary)" font-family="Inter,sans-serif">'+labels[j]+'</text>';
    svg+='<text x="'+points[j].x+'" y="'+(points[j].y-8)+'" text-anchor="middle" font-size="7" font-weight="700" fill="'+col+'" font-family="Inter,sans-serif">'+points[j].score.toFixed(1)+'</text>';
  }
  svg+='</svg>';

  var html='<div class="card animate-in delay-3" aria-label="Weekly pollen trend">'+
    '<div class="card-title"><span aria-hidden="true">\uD83D\uDCC8</span> 7-Day Pollen Trend</div>'+
    svg+'</div>';
  return html;
}

/* ============ v8: Allergy Season Alert ============ */
function renderAllergySeasonAlert(pollenData){
  if(!pollenData||!pollenData.hourly) return '';
  // Check if average score < 5 for 3 or more consecutive days
  var consecutiveBad=0;
  var maxConsecutive=0;
  for(var d=0;d<7;d++){
    var avg=getDayAverage(pollenData,d);
    var sc=calcScore(avg);
    if(sc<5){
      consecutiveBad++;
      if(consecutiveBad>maxConsecutive) maxConsecutive=consecutiveBad;
    } else {
      consecutiveBad=0;
    }
  }
  if(maxConsecutive<3) return '';

  var html='<div class="card animate-in delay-3" style="border-left:4px solid var(--danger-high);'+
    'background:linear-gradient(135deg,var(--glass-bg) 0%,rgba(229,62,62,0.06) 100%)" '+
    'aria-label="Allergy season alert" role="alert">'+
    '<div class="card-title"><span aria-hidden="true">\u26A0\uFE0F</span> Allergy Season Detected!</div>'+
    '<div style="font-size:0.9rem;line-height:1.6;color:var(--text)">'+
    'Pollen levels have been elevated for <strong>'+maxConsecutive+'+ consecutive days</strong>. '+
    'This pattern suggests an active allergy season. Consider:'+
    '<ul style="margin:8px 0 0 16px;padding:0">'+
    '<li>Taking daily antihistamines preventively</li>'+
    '<li>Keeping windows closed</li>'+
    '<li>Showering after outdoor activities</li>'+
    '</ul></div></div>';

}

function bindThresholdSlider(currentScore){
  var slider=$('threshold-slider');
  if(!slider) return;
  slider.addEventListener('input',function(){
    var val=parseInt(this.value);

    LS.set('alertThreshold',val);
    var display=$('threshold-display');
    if(display) display.textContent=val;
    // Update alert message
    var alertMsg=$('threshold-alert-msg');
    if(currentScore!=null && currentScore<val){

        if(container){
          var div=document.createElement('div');
          div.className='threshold-alert threshold-alert-active';
          div.id='threshold-alert-msg';

    if(currentScore!=null) renderSafetyAlert(currentScore);

}

/* ============ Share Card ============ */
function generateShareCard(score,cityName,pollenData){
  var canvas=document.createElement('canvas');
  var w=600,h=400;
  canvas.width=w;canvas.height=h;
  var ctx=canvas.getContext('2d');
  // roundRect polyfill
  if(!ctx.roundRect){ctx.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
  }}

  // Background
  var bg=ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#F0FFF4');bg.addColorStop(1,'#C6F6D5');
  ctx.fillStyle=bg;
  ctx.beginPath();
  ctx.roundRect(0,0,w,h,16);
  ctx.fill();

  // Score circle
  var cx=w/2,cy=140,r=70;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='#FFFFFF';ctx.fill();
  ctx.lineWidth=8;
  ctx.strokeStyle='#C6F6D5';
  ctx.stroke();
  // Score arc
  var color=scoreColor(score);
  var startAngle=-Math.PI/2;
  var endAngle=startAngle+(Math.PI*2)*(score/10);
  ctx.beginPath();ctx.arc(cx,cy,r,startAngle,endAngle);
  ctx.strokeStyle=color;ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();
  // Score text
  ctx.fillStyle=color;
  ctx.font='bold 42px -apple-system,BlinkMacSystemFont,Inter,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(score.toFixed(1),cx,cy);

  // Recommendation text inside circle (below score)
  var recText=score>=5?'Safe to go out':'Stay inside';
  var recColor=score>=5?'#38A169':'#E53E3E';
  ctx.fillStyle=recColor;
  ctx.font='bold 13px -apple-system,BlinkMacSystemFont,Inter,sans-serif';
  ctx.fillText(recText,cx,cy+24);

  // City + date
  ctx.fillStyle='#1A3A2A';
  ctx.font='bold 18px -apple-system,BlinkMacSystemFont,Inter,sans-serif';
  ctx.fillText(cityName||'Unknown',cx,cy+r+30);
  ctx.fillStyle='#3A5A4A';
  ctx.font='14px -apple-system,BlinkMacSystemFont,Inter,sans-serif';
  ctx.fillText(new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}),cx,cy+r+52);

  // Pollen bars
  var hourIdx=getCurrentHourIndex();
  var currentPollen=getPollenForHour(pollenData,hourIdx);
  var barTypes=[POLLEN_TYPES[0],POLLEN_TYPES[1],POLLEN_TYPES[2]]; // Grass, Birch, Ragweed
  var barY=cy+r+80;
  var barWidth=200;
  var barHeight=12;
  var barX=cx-barWidth/2-40;

  barTypes.forEach(function(t,i){
    var y=barY+i*28;
    var raw=currentPollen[t.key]||0;
    var pct=Math.min(raw/t.max,1);
    // Label
    ctx.fillStyle='#3A5A4A';
    ctx.font='600 12px -apple-system,BlinkMacSystemFont,Inter,sans-serif';
    ctx.textAlign='right';
    ctx.fillText(t.label,barX-8,y+barHeight/2+4);
    // Bar background
    ctx.fillStyle='#C6F6D5';
    ctx.beginPath();ctx.roundRect(barX,y,barWidth,barHeight,6);ctx.fill();
    // Bar fill
    var fillW=Math.max(pct*barWidth,4);
    ctx.fillStyle=pollenBarColor(raw,t.max);
    ctx.beginPath();ctx.roundRect(barX,y,fillW,barHeight,6);ctx.fill();
    // Value
    ctx.fillStyle='#3A5A4A';
    ctx.textAlign='left';
    ctx.fillText(Math.round(raw)+'',barX+barWidth+8,y+barHeight/2+4);
  });

  // Branding
  ctx.fillStyle='#68D391';
  ctx.font='bold 13px -apple-system,BlinkMacSystemFont,Inter,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('Checked with PollenPal \ud83c\udf3b',cx,h-20);

  return canvas;
}

function shareScore(){
  if(!state.pollenData||!state.location) return;
  var hourIdx=getCurrentHourIndex();
  var currentPollen=getPollenForHour(state.pollenData,hourIdx);
  var score=calcScore(currentPollen);
  var canvas=generateShareCard(score,state.location.name,state.pollenData);

  canvas.toBlob(function(blob){
    if(!blob) return;
    var file=new File([blob],'pollenpal-score.png',{type:'image/png'});

    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({
        title:'PollenPal Safety Score',
        text:'Safety Score: '+score.toFixed(1)+'/10 in '+(state.location.name||'my city')+'. Check pollen levels with PollenPal!',
        files:[file]
      }).catch(function(){});
    } else {
      // Download fallback
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;a.download='pollenpal-score.png';
      document.body.appendChild(a);a.click();
      document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url)},1000);
    }
  },'image/png');
}

function getPhrase(score, weather){
  var level, key;
  if(score>=8){level='excellent';key='excellent';}
  else if(score>=6){level='good';key='good';}
  else if(score>=4){level='moderate';key='moderate';}
  else if(score>=2){level='poor';key='poor';}
  else{level='severe';key='severe';}

  var pool=PHRASES[key].slice();
  // Add weather variants
  if(weather){
    if(weather.rain>0.5 && PHRASES[key+'_rainy']) pool=pool.concat(PHRASES[key+'_rainy']);
    if(weather.wind>20 && PHRASES[key+'_windy']) pool=pool.concat(PHRASES[key+'_windy']);
  }
  // Deterministic-ish daily pick
  var day=new Date().getDate();
  return pool[day%pool.length];
}

function getScoreLevel(score){
  for(var i=0;i<SCORE_LEVELS.length;i++){
    if(score>=SCORE_LEVELS[i].min) return SCORE_LEVELS[i];
  }
  return SCORE_LEVELS[SCORE_LEVELS.length-1];
}

/* ============ Score Calculation ============ */
function calcScore(pollenValues){
  var weightedSum=0;
  POLLEN_TYPES.forEach(function(t){
    var raw=pollenValues[t.key]||0;
    var norm=Math.min(raw/t.max*100,100);
    weightedSum+=norm*t.weight;
  });
  var s=Math.max(0,10-(weightedSum/10));
  return Math.round(s*10)/10;
}

function getPollenForHour(data,hourIndex){
  var vals={};
  if(!data||!data.hourly){
    POLLEN_TYPES.forEach(function(t){vals[t.key]=0});
    return vals;
  }
  POLLEN_TYPES.forEach(function(t){
    vals[t.key]=(data.hourly[t.key]&&data.hourly[t.key][hourIndex])||0;
  });
  return vals;
}

function getCurrentHourIndex(){
  var h=new Date().getHours();
  return Math.min(h,23);
}

function getDayAverage(data,dayOffset){
  var start=dayOffset*24;
  var end=start+24;
  var sums={};
  var count=0;
  POLLEN_TYPES.forEach(function(t){sums[t.key]=0});
  if(!data||!data.hourly) return sums;
  for(var i=start;i<end&&i<(data.hourly.time||[]).length;i++){
    POLLEN_TYPES.forEach(function(t){
      sums[t.key]+=(data.hourly[t.key]&&data.hourly[t.key][i])||0;
    });
    count++;
  }
  if(count===0) return sums;
  POLLEN_TYPES.forEach(function(t){sums[t.key]=sums[t.key]/count});
  return sums;
}

/* ============ Color helpers ============ */
function scoreColor(score){
  if(score>=8) return '#38A169';
  if(score>=6) return '#68D391';
  if(score>=4) return '#B7791F';
  if(score>=2) return '#C05621';
  return '#E53E3E';
}

function pollenBarColor(raw,max){
  var pct=Math.min(raw/max,1);
  if(pct<0.25) return '#38A169';
  if(pct<0.5) return '#B7791F';
  if(pct<0.75) return '#C05621';
  return '#E53E3E';
}

/* ============ API ============ */
var CACHE_DURATION=3600000; // 1 hour

function fetchJSON(url){
  return fetch(url).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  });
}

function fetchPollenData(lat,lon){
  var cacheKey='pollen_'+lat.toFixed(2)+'_'+lon.toFixed(2);
  var cached=LS.get(cacheKey);
  if(cached&&Date.now()-cached.ts<CACHE_DURATION){
    return Promise.resolve(cached.data);
  }
  var url='https://air-quality-api.open-meteo.com/v1/air-quality?latitude='+lat+
    '&longitude='+lon+'&hourly=birch_pollen,grass_pollen,ragweed_pollen,mugwort_pollen,alder_pollen,olive_pollen&forecast_days=7';
  return fetchJSON(url).then(function(data){
    LS.set(cacheKey,{ts:Date.now(),data:data});
    return data;
  });
}

function fetchWeatherData(lat,lon){
  var cacheKey='weather_'+lat.toFixed(2)+'_'+lon.toFixed(2);
  var cached=LS.get(cacheKey);
  if(cached&&Date.now()-cached.ts<CACHE_DURATION){
    return Promise.resolve(cached.data);
  }
  var url='https://api.open-meteo.com/v1/forecast?latitude='+lat+
    '&longitude='+lon+'&current=temperature_2m,relative_humidity_2m,wind_speed_10m,rain&daily=temperature_2m_max,temperature_2m_min';
  return fetchJSON(url).then(function(data){
    LS.set(cacheKey,{ts:Date.now(),data:data});
    return data;
  });
}

function searchCity(query){
  return fetchJSON('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(query)+'&count=5&language=en');
}
